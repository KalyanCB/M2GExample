The error message suggests that the Gradle Wrapper (gradlew) is missing from the project. However, the Gradle Wrapper is not part of the build.gradle file content, it's a separate file that should be included in the project.

The build.gradle file provided seems to be correct and should not cause the error message you're seeing. The error is likely due to the missing Gradle Wrapper in your project directory.

You can generate the Gradle Wrapper by running the following command in your project directory:

```
gradle wrapper
```

This will generate the necessary `gradlew` and `gradlew.bat` files (for Unix-based and Windows systems, respectively), along with the `gradle/wrapper/gradle-wrapper.jar` and `gradle/wrapper/gradle-wrapper.properties` files.

After generating the Gradle Wrapper, you should be able to build your project using `./gradlew build` (Unix-based systems) or `gradlew.bat build` (Windows).

Please note that you need to have Gradle installed on your machine to generate the Gradle Wrapper. If you don't have Gradle installed, you can download it from the official Gradle website.

If you're sure that the Gradle Wrapper is present and correctly configured in your project, then the error might be caused by something else and we would need more information to diagnose it.
